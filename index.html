<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Time Capsule</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar bg-primary">
    <div class="container">
        <span class="navbar-brand text-white">Time Capsule</span>
        <a href="add.html" class="btn btn-light btn-sm">+ Tambah Pesan</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row" id="listContainer"></div>
</div>

<!-- MODAL ERROR -->
<div class="modal fade" id="modalError">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-4">
            <div class="modal-body">
                <h5>⏳ Masih Terkunci</h5>
                <p class="text-muted">Pesan akan terbuka dalam:</p>
                <h4 id="countdown"></h4>
                <button class="btn btn-primary mt-3" data-bs-dismiss="modal">Oke</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL PESAN -->
<div class="modal fade" id="modalPesan">
    <div class="modal-dialog">
        <div class="modal-content text-center p-3">
            <div class="modal-body">
                <div id="capsuleAnim" class="capsule"></div>

                <div id="isiPesan" style="display:none;">
                    <h5 id="modalNama"></h5>
                    <p id="modalIsi"></p>
                    <small id="modalTanggal"></small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/index.js"></script>

</body>
</html>
