<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tambah Pesan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

<nav class="navbar bg-primary">
    <div class="container">
        <span class="navbar-brand text-white">Tambah Pesan</span>
        <a href="index.html" class="btn btn-light btn-sm">← Kembali</a>
    </div>
</nav>

<div class="container d-flex justify-content-center mt-5">
    <div class="card p-4" style="max-width: 450px; width: 100%;">
        
        <h4 class="mb-3">Tulis Pesan</h4>

        <input type="text" id="nama" class="form-control mb-3" placeholder="Nama">
        <textarea id="pesan" class="form-control mb-3" rows="4" placeholder="Pesan"></textarea>
        <input type="text" id="tanggal" class="form-control mb-3" placeholder="Pilih tanggal">

        <button class="btn btn-primary w-100" onclick="simpanPesan()">Simpan</button>
    </div>
</div>

<!-- MODAL NOTIF -->
<div class="modal fade" id="modalNotif">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-4">
            <div class="modal-body">

                <div id="modalIcon" class="mb-3"></div>

                <h5 id="modalTitle"></h5>
                <p id="modalText" class="text-muted"></p>

                <button class="btn btn-primary mt-2" data-bs-dismiss="modal">
                    Oke
                </button>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/add.js"></script>

</body>
</html>
